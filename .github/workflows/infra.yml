name: Terraform + Ansible Demo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  infra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get EC2 Public IP
        id: ip
        run: echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Update inventory with EC2 public IP
        run: |
          echo ["demo"] > inventory.ini
          echo "${{ steps.ec2.outputs.ip }} ansible_user=ec2-user ansible_ssh_private_key_file=demo-key-2.pem" >> inventory.ini

      - name: Run Ansible Playbook
        run: |
          chmod 600 demo-key-2.pem
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini playbook.yml
