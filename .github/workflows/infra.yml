name: Terraform + Ansible Demo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  infra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: terraform init

      - name: Force recreate EC2 instance
        run: terraform taint aws_instance.demo

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get EC2 Public IP
        id: ip
        run: echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      - name: Wait for SSH to be available a
        run: |
          aws ec2 wait instance-status-ok --instance-ids $(terraform output -raw instance_id)
      - name: Second Wait for SSH to be available
        run: |
          for i in {1..30}; do
            nc -zv $(terraform output -raw public_ip) 22 && break
            echo "Waiting for SSH..."
            sleep 5
          done
      - name: Wait for cloud-init to finish
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          PUBLIC_IP=$(terraform output -raw public_ip)
          echo "Waiting for cloud-init to finish on $PUBLIC_IP..."
          for i in {1..60}; do
            ssh -o StrictHostKeyChecking=no -i demo-key-2.pem ec2-user@$PUBLIC_IP "test -f /var/lib/cloud/instance/boot-finished" && break
            echo "cloud-init not finished yet..."
            sleep 5
          done

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Update inventory with EC2 public IP
        run: |
          echo "[demo]" > inventory.ini
          echo "${{ steps.ip.outputs.ip }} ansible_user=ec2-user ansible_ssh_private_key_file=demo-key-2.pem ansible_python_interpreter=/usr/bin/python3" >> inventory.ini

      - name: Debug inventory
        run: |
          echo "===== INVENTORY CONTENTS Prasanna====="
          cat inventory.ini
          echo "$==============================$"

      - name: Run Ansible Playbook
        run: |
          chmod 600 demo-key-2.pem
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory.ini playbook.yml
